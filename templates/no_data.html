<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background: white;
            padding: 60px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #1a1a2e;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            font-size: 18px;
        }

        code {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="error-card">
        <h1>No Data Available</h1>
        <p>Run the analysis pipeline first:</p>
        <code>python scripts/master_flow.py</code>
    </div>
</body>

</html>
